    <!--
      GOOGLE FONTS — Vietnamese subset REQUIRED
      ─────────────────────────────────────────
      • Montserrat : Headings, hero titles, CTAs, section labels, badges
                     Weights: 400 (regular), 500, 600, 700, 800, 900 (black)
                     Italic: 400, 700 (for emphasis in body copy)
      • Inter       : Body text, navigation, dashboard data, UI descriptions
                     Weights: 300 (light), 400, 500, 600, 700, 800 (extrabold)
      • IBM Plex Mono: Pricing, metrics, IDs, timestamps (monospaced precision)
                     Weights: 400, 500, 600

      The &subset=vietnamese parameter ensures Google CDN serves glyphs
      for ALL Vietnamese diacritics, including uppercase variants:
        Ắ Ặ Ẵ Ẳ Ẩ Ẫ Ẻ Ẽ Ề Ế Ệ Ỉ Ị Ọ Ộ Ổ Ỗ Ờ Ớ Ợ Ở Ỡ Ụ Ứ Ự Ử Ữ...
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500;600&subset=vietnamese&display=swap"
